services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready zookeeper:2181 30"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  auth-db:
    image: postgres:16
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  user-db:
    image: postgres:16
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5434:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  wallet-db:
    image: postgres:16
    container_name: wallet-db
    environment:
      POSTGRES_DB: wallet_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5435:5432"
    volumes:
      - wallet_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wallet_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  reward-db:
    image: postgres:16
    container_name: reward-db
    environment:
      POSTGRES_DB: reward_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5436:5432"
    volumes:
      - reward_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reward_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  eureka-server:
    image: shivamkumar1352/eureka-server:latest
    build:
      context: ./eureka-server
    container_name: eureka-server
    environment:
      EUREKA_INSTANCE_HOSTNAME: eureka-server
      MANAGEMENT_TRACING_ENABLED: ${MANAGEMENT_TRACING_ENABLED:-true}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:-1.0}
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      - zipkin
    ports:
      - "8761:8761"
    restart: unless-stopped

  auth-service:
    image: shivamkumar1352/auth-service:latest
    build:
      context: ./auth-service
    container_name: auth-service
    environment:
      AUTH_DB_URL: jdbc:postgresql://auth-db:5432/auth_db
      AUTH_DB_USERNAME: postgres
      AUTH_DB_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MANAGEMENT_TRACING_ENABLED: ${MANAGEMENT_TRACING_ENABLED:-true}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:-1.0}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      auth-db:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_started
    ports:
      - "8084:8084"
    restart: unless-stopped

  user-service:
    dns:
      - 8.8.8.8
      - 1.1.1.1
    image: shivamkumar1352/user-service:latest
    build:
      context: ./user-service
    container_name: user-service
    environment:
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MANAGEMENT_TRACING_ENABLED: ${MANAGEMENT_TRACING_ENABLED:-true}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:-1.0}
      USER_DB_URL: jdbc:postgresql://user-db:5432/user_db
      USER_DB_USERNAME: postgres
      USER_DB_PASSWORD: root
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      KYC_UPLOAD_DIR: /app/uploads/kyc
    depends_on:
      user-db:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_started
    ports:
      - "8082:8082"
    volumes:
      - user_kyc_uploads:/app/uploads/kyc
    restart: unless-stopped

  wallet-service:
    image: shivamkumar1352/wallet-service:latest
    build:
      context: ./wallet-service
    container_name: wallet-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MANAGEMENT_TRACING_ENABLED: ${MANAGEMENT_TRACING_ENABLED:-true}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:-1.0}
      RAZORPAY_KEY: ${RAZORPAY_KEY:-}
      RAZORPAY_SECRET: ${RAZORPAY_SECRET:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WALLET_DB_URL: jdbc:postgresql://wallet-db:5432/wallet_db
      WALLET_DB_USERNAME: postgres
      WALLET_DB_PASSWORD: root
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      wallet-db:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_started
    ports:
      - "8083:8083"
    restart: unless-stopped

  reward-service:
    image: shivamkumar1352/reward-service:latest
    build:
      context: ./reward-service
    container_name: reward-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MANAGEMENT_TRACING_ENABLED: ${MANAGEMENT_TRACING_ENABLED:-true}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:-1.0}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REWARD_DB_URL: jdbc:postgresql://reward-db:5432/reward_db
      REWARD_DB_USERNAME: postgres
      REWARD_DB_PASSWORD: root
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      reward-db:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_started
    ports:
      - "8085:8085"
    restart: unless-stopped

  notification-service:
    image: shivamkumar1352/notification-service:latest
    build:
      context: ./notification_service
    container_name: notification-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MANAGEMENT_TRACING_ENABLED: ${MANAGEMENT_TRACING_ENABLED:-true}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:-1.0}
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      kafka:
        condition: service_started
      zipkin:
        condition: service_started
      eureka-server:
        condition: service_started
    ports:
      - "8090:8090"
    restart: unless-stopped

  api-gateway:
    image: shivamkumar1352/api-gateway:latest
    build:
      context: ./api-gateway
    container_name: api-gateway
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      MANAGEMENT_TRACING_ENABLED: ${MANAGEMENT_TRACING_ENABLED:-true}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:-1.0}
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      eureka-server:
        condition: service_started
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      wallet-service:
        condition: service_started
      reward-service:
        condition: service_started
    ports:
      - "8080:8080"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.1.1
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

